<!doctype html>
<!--
  lang="de" is correct (the app is German), so the browser detects the source
  language and offers an ACCURATE translation. Browser auto-translation is left
  ENABLED at the owner's request. ⚠️ Trade-off (accepted): translating the live
  page can still crash React reconciliation ("NotFoundError: insertBefore" / the
  "Diese Seite konnte nicht geladen werden" break), because Google Translate
  rewrites text nodes out from under React. Re-add translate="no" + the notranslate
  meta to make the app stable again.
-->
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HeyKiki Portal</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
